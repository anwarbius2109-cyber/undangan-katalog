<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katalog Undangan Digital</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/style.css">
</head>

<body class="bg-gray-100">

  <!-- NAVBAR -->
<header class="sticky top-0 bg-white/80 backdrop-blur shadow z-50">
  <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">

    <!-- LOGO -->
    <div class="flex items-center gap-2">

  <img src="assets/MSA H.png" alt="logo" class="w-8 h-8 object-contain">

  <h1 class="font-bold text-lg">
    Katalog Undangan
  </h1>

</div>

    <!-- MENU DESKTOP -->
    <nav class="hidden md:flex items-center gap-6 text-sm">
      <a href="#" class="hover:text-black text-gray-600">Home</a>
      <a href="#katalog" class="hover:text-black text-gray-600">Katalog</a>
      <a href="https://wa.me/6281261233730" target="_blank"
        class="bg-black text-white px-4 py-2 rounded-full hover:bg-gray-800 transition">
        Order
      </a>
    </nav>

    <!-- HAMBURGER -->
    <button id="menuBtn" class="md:hidden text-2xl font-bold">
      ☰
    </button>

  </div>

  <!-- MOBILE MENU -->
  <div id="mobileMenu" 
class="hidden md:hidden px-4 pb-4 space-y-3 bg-white shadow-md">

    <a href="#" class="block text-gray-700">Home</a>

    <a href="#katalog" class="block text-gray-700">
      Katalog
    </a>

    <a href="https://wa.me/6281261233730" target="_blank"
      class="block bg-black text-white px-4 py-2 rounded-full text-center">
      Order
    </a>

  </div>
</header>

  <!-- HERO -->
  <section class="text-center py-10">
    <h2 class="text-2xl font-bold">Pilih Tema Undangan Kamu</h2>
    <p class="text-gray-500">Klik preview untuk lihat demo</p>
  </section>
<div class="max-w-6xl mx-auto px-4 mb-6 flex gap-3 flex-wrap justify-center">

  <button onclick="filterKategori('all')" class="btn-filter active">Semua</button>
  <button onclick="filterKategori('wedding')" class="btn-filter">Wedding</button>
  <button onclick="filterKategori('khitan')" class="btn-filter">Khitan</button>
  <button onclick="filterKategori('ulangtahun')" class="btn-filter">Ulang Tahun</button>

</div>
  <!-- KATALOG -->
  <section class="max-w-6xl mx-auto px-4 pb-10">
    <div id="katalog" class="grid md:grid-cols-3 gap-6"></div>
  </section>

  <script src="assets/script.js"></script>
  <!-- SCRIPT MENU MOBILE -->
<script>
document.addEventListener("DOMContentLoaded", function () {
  const btn = document.getElementById("menuBtn");
  const menu = document.getElementById("mobileMenu");

  if (btn && menu) {
    btn.addEventListener("click", function () {
      menu.classList.toggle("hidden");

      btn.innerText = menu.classList.contains("hidden") ? "☰" : "✕";
    });
  }
});
</script>

</body>
</html>
